<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Diary</title>
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <!-- ヘッダー【flex 横2列: ロゴ + ナビ】 -->
    <header class="header">
      <!-- └ ロゴ（左） -->
      <img class="header_logo" src="img/logo.svg" alt="My Work" />
      <!-- └ ナビ（右） -->
      <nav class="header_nav">
        <!-- ナビリスト【flex 横5列: About + Works + News + Contact + Instagram】 -->
        <ul class="nav_list">
          <li class="nav_item"><a class="nav_link" href="#">About</a></li>
          <li class="nav_item"><a class="nav_link" href="#">Works</a></li>
          <li class="nav_item"><a class="nav_link" href="#">News</a></li>
          <li class="nav_item"><a class="nav_link" href="#">Contact</a></li>
          <li class="nav_item">
            <a class="nav_link" href="#"><img class="nav_img" src="img/icon-instagram.png" alt="Instagram" /></a>
          </li>
        </ul>
      </nav>
    </header>

    <main class="main">
      <!-- ===============================================
       Contact
       =============================================== -->
      <section id="contact" class="contact_area">
        <h2 class="contact_title">Contact</h2>
        <!-- お問い合わせフォーム　　 -->
        <form class="contact_form" action="#">
          <div class="contact_list">
            <label class="contact_label" for="name">Name</label><br />
            <input class="contact_input" type="text" id="name" name="name" />
          </div>
          <div class="contact_list">
            <label class="contact_label" for="email">Email</label><br />
            <input class="contact_input" type="email" id="email" name="email" />
          </div>
          <div class="contact_list">
            <label class="contact_label" for="message">Message</label><br />
            <textarea class="contact_input" id="message" name="message"></textarea>
          </div>
          <!-- 送信ボタン -->
          <div class="contact_btn">
            <input type="submit" value="SEND" />
          </div>
        </form>
      </section>
    </main>

    <footer class="footer">
      <p class="footer_copy">&copy; My Work</p>
    </footer>
  </body>
</html>
